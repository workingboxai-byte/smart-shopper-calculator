<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Універсальний калькулятор "помічник покупця"</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-blue: #3498db;
            --accent-result: #27ae60;
            --formula-bg: #eaeded;
            --border-color: #dcdde1;
            --btn-reset-bg: #e74c3c;
            --btn-reset-hover: #c0392b;
            --btn-save-bg: #2ecc71;
            --btn-save-hover: #27ae60;
            --btn-help-bg: #f39c12;
            --btn-help-hover: #d35400;
            --discount-bg: #fff8e1;
            --discount-border: #ffb300;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .calc-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            padding: 20px;
            width: 100%;
            max-width: 480px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
            color: var(--text-main);
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 12px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input, select {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            background-color: #fff;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--accent-blue);
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-blue);
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 4px;
            margin-top: 15px;
            margin-bottom: 12px;
        }

        .result-box {
            background-color: #edfbf2;
            border: 1px solid #c2eed5;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .result-label {
            font-size: 14px;
            font-weight: 600;
            color: #1e7e43;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--accent-result);
        }

        .formula-box {
            background-color: var(--formula-bg);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            text-align: center;
            color: #576574;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .discount-container {
            background-color: var(--discount-bg);
            border: 1px solid var(--discount-border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .actions-block {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }

        button {
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-reset { background-color: var(--btn-reset-bg); }
        .btn-reset:hover { background-color: var(--btn-reset-hover); }

        .btn-help { background-color: #3498db; }
        .btn-help:hover { background-color: #2980b9; }

        .btn-save { background-color: var(--btn-save-bg); }
        .btn-save:hover { background-color: var(--btn-save-hover); }

        .history-container {
            margin-top: 20px;
        }

        .history-item {
            background: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-best-style {
            background: #eafaf1 !important;
            border-color: #2ecc71 !important;
            font-weight: bold;
        }

        .badge-best {
            background-color: var(--accent-result);
            color: white;
            padding: 3px 7px;
            border-radius: 12px;
            font-size: 11px;
            text-transform: uppercase;
        }

        /* Стилі для Модального Вікна Довідки */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .modal-content {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-modal {
            position: absolute;
            top: 12px;
            right: 15px;
            font-size: 24px;
            font-weight: bold;
            color: var(--text-muted);
            cursor: pointer;
        }

        .close-modal:hover {
            color: var(--text-main);
        }

        .help-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-main);
        }

        .help-text h3 {
            color: var(--accent-blue);
            margin-top: 15px;
            margin-bottom: 5px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 3px;
            font-size: 15px;
        }
        
        .help-text p, .help-text ul {
            margin-top: 5px;
            margin-bottom: 10px;
        }

        .help-text ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <h2 id="app-title">Помічник покупця</h2>

    <div class="row-grid">
        <div class="input-group">
            <label id="lbl-lang">Мова / Language</label>
            <select id="lang-select">
                <option value="uk" selected>Українська</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="input-group">
            <label id="lbl-currency">Валюта</label>
            <select id="currency-select">
                <option value="UAH">Гривні (грн)</option>
                <option value="USD">Долари ($)</option>
                <option value="EUR">Євро (€)</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label id="lbl-unit-type">Що вимірюємо?</label>
        <select id="unit-type-select">
            <option value="weight">Вага (кг / гр)</option>
            <option value="volume">Об'єм (л / мл)</option>
            <option value="length">Довжина (м / см)</option>
        </select>
    </div>

    <div class="section-title" id="sec-base">Базова ціна та міра товару</div>
    
    <div class="row-grid">
        <div class="input-group">
            <label id="lbl-pmain">Ціна: Цілі</label>
            <input type="number" id="price-main" value="0" min="0">
        </div>
        <div class="input-group">
            <label id="lbl-pfractional">Копійки</label>
            <input type="number" id="price-fractional" value="0" min="0" max="99">
        </div>
    </div>

    <div class="row-grid">
        <div class="input-group">
            <label id="lbl-bmain">Міра: Цілі (кг)</label>
            <input type="number" id="base-main" value="0" min="0">
        </div>
        <div class="input-group">
            <label id="lbl-bfractional">Грами (гр)</label>
            <input type="number" id="base-fractional" value="0" min="0">
        </div>
    </div>

    <div class="section-title" id="sec-target">Скільки вам потрібно розрахувати</div>
    
    <div class="row-grid">
        <div class="input-group">
            <label id="lbl-tmain">Потрібно: Цілі (кг)</label>
            <input type="number" id="target-main" value="0" min="0">
        </div>
        <div class="input-group">
            <label id="lbl-tfractional">Грами (гр)</label>
            <input type="number" id="target-fractional" value="0" min="0">
        </div>
    </div>

    <div class="discount-container">
        <div class="input-group" style="margin-bottom:0;">
            <label id="lbl-discount">Додаткова знижка на результат (%)</label>
            <input type="number" id="final-discount" value="0" min="0" max="100">
        </div>
    </div>

    <div class="section-title" id="sec-result">Результат розрахунку</div>
    
    <div class="formula-box" id="formula-text">
        За 0 кг при базі 0 кг
    </div>

    <div class="result-box">
        <div class="result-label" id="lbl-res-title">Остаточний результат:</div>
        <div class="result-value" id="result-value">0 грн 00 коп</div>
    </div>

    <div class="actions-block">
        <button class="btn-reset" id="btn-reset">✕ Очистити</button>
        <button class="btn-help" id="btn-help">? Довідка</button>
        <button class="btn-save" id="btn-save">✓ Зберегти</button>
    </div>

    <div class="history-container">
        <div class="section-title" id="sec-history">Порівняння товарів (макс. 3)</div>
        <div id="history-list"></div>
    </div>
</div>

<div id="help-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="close-modal">&times;</span>
        <div class="help-text" id="help-content">
            </div>
    </div>
</div>

<script>
    // Елементи інтерфейсу
    const langSelect = document.getElementById('lang-select');
    const currencySelect = document.getElementById('currency-select');
    const unitTypeSelect = document.getElementById('unit-type-select');
    
    const priceMainInput = document.getElementById('price-main');
    const priceFractionalInput = document.getElementById('price-fractional');
    const baseMainInput = document.getElementById('base-main');
    const baseFractionalInput = document.getElementById('base-fractional');
    const targetMainInput = document.getElementById('target-main');
    const targetFractionalInput = document.getElementById('target-fractional');
    const finalDiscountInput = document.getElementById('final-discount');

    const formulaText = document.getElementById('formula-text');
    const resultValue = document.getElementById('result-value');
    const historyList = document.getElementById('history-list');

    const btnReset = document.getElementById('btn-reset');
    const btnSave = document.getElementById('btn-save');
    const btnHelp = document.getElementById('btn-help');
    const helpModal = document.getElementById('help-modal');
    const closeModal = document.getElementById('close-modal');
    const helpContent = document.getElementById('help-content');

    // Текстові пакети перекладів інтерфейсу
    const translations = {
        uk: {
            title: "Помічник покупця",
            lbl_lang: "Мова / Language",
            lbl_currency: "Валюта",
            lbl_unit_type: "Що вимірюємо?",
            sec_base: "Базова ціна та міра товару",
            sec_target: "Скільки вам потрібно розрахувати",
            sec_result: "Результат розрахунку",
            sec_history: "Порівняння товарів (макс. 3)",
            lbl_pmain: "Ціна: Цілі",
            lbl_pfractional: "Копійки",
            lbl_discount: "Додаткова знижка на результат (%)",
            lbl_res_title: "Остаточний результат:",
            btn_reset: "✕ Очистити",
            btn_save: "✓ Зберегти",
            btn_help: "? Довідка",
            badge_best: "ВИГІДНО!",
            item_text: "Товар",
            formula_part: "за міру",
            units: {
                weight: { main: "кг", fractional: "гр", lbl_main: "Міра: Цілі (кг)", lbl_frac: "Грами (гр)", lbl_tmain: "Потрібно: Цілі (кг)", lbl_tfrac: "Грами (гр)" },
                volume: { main: "л", fractional: "мл", lbl_main: "Міра: Цілі (л)", lbl_frac: "Мілілітри (мл)", lbl_tmain: "Потрібно: Цілі (л)", lbl_tfrac: "Мілілітри (мл)" },
                length: { main: "м", fractional: "см", lbl_main: "Міра: Цілі (м)", lbl_frac: "Сантиметри (см)", lbl_tmain: "Потрібно: Цілі (м)", lbl_tfrac: "Сантиметри (см)" }
            }
        },
        en: {
            title: "Smart Shopper",
            lbl_lang: "Мова / Language",
            lbl_currency: "Currency",
            lbl_unit_type: "Measurement Type",
            sec_base: "Base Price & Measure",
            sec_target: "How much do you need to calculate",
            sec_result: "Calculation Result",
            sec_history: "Product Comparison (max 3)",
            lbl_pmain: "Price: Whole",
            lbl_pfractional: "Cents",
            lbl_discount: "Additional discount on result (%)",
            lbl_res_title: "Final Result:",
            btn_reset: "✕ Clear",
            btn_save: "✓ Save",
            btn_help: "? Info",
            badge_best: "BEST DEAL!",
            item_text: "Item",
            formula_part: "per measure",
            units: {
                weight: { main: "kg", fractional: "g", lbl_main: "Measure: Whole (kg)", lbl_frac: "Grams (g)", lbl_tmain: "Target: Whole (kg)", lbl_tfrac: "Grams (g)" },
                volume: { main: "L", fractional: "ml", lbl_main: "Measure: Whole (L)", lbl_frac: "Milliliters (ml)", lbl_tmain: "Target: Whole (L)", lbl_tfrac: "Milliliters (ml)" },
                length: { main: "m", fractional: "cm", lbl_main: "Measure: Whole (m)", lbl_frac: "Centimeters (cm)", lbl_tmain: "Target: Whole (m)", lbl_tfrac: "Centimeters (cm)" }
            }
        }
    };

    const currencies = {
        UAH: { main: "грн", fractional: "коп" },
        USD: { main: "$", fractional: "¢" },
        EUR: { main: "€", fractional: "¢" }
    };

    let savedItems = [];

    // Функція оновлення текстових написів мови та мір
    function updateLanguageAndLabels() {
        const lang = langSelect.value;
        const type = unitTypeSelect.value;
        const t = translations[lang];
        const unit = t.units[type];

        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-lang').textContent = t.lbl_lang;
        document.getElementById('lbl-currency').textContent = t.lbl_currency;
        document.getElementById('lbl-unit-type').textContent = t.lbl_unit_type;
        document.getElementById('sec-base').textContent = t.sec_base;
        document.getElementById('sec-target').textContent = t.sec_target;
        document.getElementById('sec-result').textContent = t.sec_result;
        document.getElementById('sec-history').textContent = t.sec_history;
        
        document.getElementById('lbl-pmain').textContent = t.lbl_pmain;
        document.getElementById('lbl-pfractional').textContent = t.lbl_pfractional;
        document.getElementById('lbl-discount').textContent = t.lbl_discount;
        document.getElementById('lbl-res-title').textContent = t.lbl_res_title;
        
        btnReset.textContent = t.btn_reset;
        btnSave.textContent = t.btn_save;
        btnHelp.textContent = t.btn_help;

        document.getElementById('lbl-bmain').textContent = unit.lbl_main;
        document.getElementById('lbl-bfractional').textContent = unit.lbl_frac;
        document.getElementById('lbl-tmain').textContent = unit.lbl_tmain;
        document.getElementById('lbl-tfractional').textContent = unit.lbl_tfrac;

        calculate();
        renderHistory();
        updateHelpContent(); // Оновлюємо мову інструкції в довідці
    }

    // Текст самої інструкції (UA та EN версії)
    function updateHelpContent() {
        const lang = langSelect.value;
        if (lang === 'uk') {
            helpContent.innerHTML = `
                <h2>Помічник покупця — Інструкція</h2>
                <p>Цей калькулятор допоможе вам швидко дізнатися точну вартість будь-якої кількості товару (на вагу, об'єм чи довжину), порівняти ціни та обрати найвигіднішу пропозицію в магазині.</p>
                
                <h3>КРОК 1: НАЛАШТУВАННЯ</h3>
                <ul>
                    <li>Оберіть зручну мову та потрібну валюту (Гривні, Долари, Євро).</li>
                    <li>Оберіть тип вимірювання товару: <b>Вага</b> (кг/гр), <b>Об'єм</b> (л/мл) або <b>Довжина</b> (м/см).</li>
                </ul>

                <h3>КРОК 2: ВВЕДЕННЯ ДАНИХ</h3>
                <p>Подивіться на цінник товару та заповніть блоки:</p>
                <ul>
                    <li><b>Базова ціна та міра:</b> Введіть ціну з цінника та вагу/об'єм, за яку вона вказана. (<i>Наприклад: якщо 150 грн вказано за 450 грамів, то в полі Цілі пишіть 0, а в Дробові — 450</i>).</li>
                    <li><b>Скільки вам потрібно:</b> Введіть ту кількість товару, яку ви реально хочете купити.</li>
                </ul>

                <h3>КРОК 3: ЗНИЖКИ ТА РЕЗУЛЬТАТ</h3>
                <ul>
                    <li>У полі <b>Остаточний результат</b> ви миттєво побачите точну вартість потрібної вам кількості.</li>
                    <li>Якщо на товар діє додаткова акція, введіть відсоток знижки в полі знижок — калькулятор одразу все перерахує.</li>
                </ul>

                <h3>КРОК 4: ПОРІВНЯННЯ ТОВАРІВ</h3>
                <p>Якщо ви вагаєтесь між 2 або 3 різними упаковками чи брендами:</p>
                <ol>
                    <li>Введіть дані першого товару та натисніть <b>Зберегти</b>.</li>
                    <li>Введіть дані другого товару (змініть ціну чи міру) і знову натисніть <b>Зберегти</b>.</li>
                    <li>Знизу з'явиться таблиця порівняння (до 3 товарів).</li>
                    <li>Програма знайде найдешевший варіант на 1 кг/л/м і підсвітить його зеленим кольором із поміткою <b>"ВИГІДНО!"</b>.</li>
                </ol>

                <h3>ВАЖЛИВІ ФАКТОРИ:</h3>
                <p>1.Копійки та грами вводяться ОКРЕМО від цілих чисел (без крапок чи ком).<br>
                2. Функція порівняння чесно враховує введену вами додаткову знижку.</p>
                <p style="text-align:right; font-weight:600; margin-top:15px; color:#7f8c8d;">Розробник: (Izi Vayb)</p>
            `;
        } else {
            helpContent.innerHTML = `
                <h2>Smart Shopper — User Manual</h2>
                <p>This calculator helps you instantly find the exact price for any custom amount of goods (by weight, volume, or length), compare prices, and pick the best deal in the store.</p>
                
                <h3>STEP 1: CONFIGURATION</h3>
                <ul>
                    <li>Choose your preferred language and currency (UAH, USD, EUR).</li>
                    <li>Select the measurement type: <b>Weight</b> (kg/g), <b>Volume</b> (L/ml), or <b>Length</b> (m/cm).</li>
                </ul>

                <h3>STEP 2: ENTERING DATA</h3>
                <p>Check the product price tag and fill in the sections:</p>
                <ul>
                    <li><b>Base Price & Measure:</b> Enter the price from the tag and the weight/volume it stands for. (<i>E.g., if it costs $5 for 450 grams, type 0 in Whole and 450 in Grams</i>).</li>
                    <li><b>How much do you need:</b> Enter the exact amount you want to buy.</li>
                </ul>

                <h3>STEP 3: DISCOUNTS & RESULTS</h3>
                <ul>
                    <li>In the <b>Final Result</b> box, you will instantly see the exact cost of your desired quantity.</li>
                    <li>If you have a coupon or cashback, type the percentage in the discount input to recalculate on the fly.</li>
                </ul>

                <h3>STEP 4: PRODUCT COMPARISON</h3>
                <p>If you are choosing between 2 or 3 different packages or brands:</p>
                <ol>
                    <li>Enter the first product data and click <b>Save</b>.</li>
                    <li>Enter the second product data (change price or measure) and click <b>Save</b> again.</li>
                    <li>A comparison list will appear below (up to 3 products).</li>
                    <li>The app calculates the unit cost per 1 kg/L/m and highlights the cheapest one in green labeled <b>"BEST DEAL!"</b>.</li>
                </ol>

                <h3>IMPORTANT TIPS:</h3>
                <p>1. DO NOT leave base measure fields empty or with a zero.<br>
                2. Enter cents and grams SEPARATELY from whole numbers (do not use dots or commas).<br>
                3. The comparison grid accurately considers all applied personal discounts.</p>
                <p style="text-align:right; font-weight:600; margin-top:15px; color:#7f8c8d;">Developer: Matsenko S. M. (Izi Vayb)</p>
            `;
        }
    }

    // Головна логіка математичних обчислень калькулятора
    function getValues() {
        const pMain = parseFloat(priceMainInput.value) || 0;
        const pFractional = parseFloat(priceFractionalInput.value) || 0;
        const bMain = parseFloat(baseMainInput.value) || 0;
        const bFractional = parseFloat(baseFractionalInput.value) || 0;
        const tMain = parseFloat(targetMainInput.value) || 0;
        const tFractional = parseFloat(targetFractionalInput.value) || 0;
        const discountPercent = parseFloat(finalDiscountInput.value) || 0;

        const totalPrice = pMain + (pFractional / 100);
        const totalBaseMeasure = bMain + (bFractional / 1000);
        const totalTargetMeasure = tMain + (tFractional / 1000);

        return { totalPrice, totalBaseMeasure, totalTargetMeasure, discountPercent, pMain, pFractional, bMain, bFractional, tMain, tFractional };
    }

    function calculate() {
        const lang = langSelect.value;
        const currType = currencySelect.value;
        const unitType = unitTypeSelect.value;
        
        const t = translations[lang];
        const currMain = currencies[currType].main;
        const currFractional = currencies[currType].fractional;
        const unit = t.units[unitType];

        const { totalPrice, totalBaseMeasure, totalTargetMeasure, discountPercent, pMain, pFractional, bMain, bFractional, tMain, tFractional } = getValues();

        if (totalBaseMeasure <= 0) {
            formulaText.innerHTML = `<span style="color:#e74c3c;">${lang === 'uk' ? 'Помилка: Базова міра не може бути 0!' : 'Error: Base measure cannot be 0!'}</span>`;
            resultValue.textContent = `0 ${currMain} 00 ${currFractional}`;
            return;
        }

        // Чиста математика ціни за одиницю товару
        const pricePerUnit = totalPrice / totalBaseMeasure;
        let finalPrice = pricePerUnit * totalTargetMeasure;

        // Застосування додаткової знижки
        if (discountPercent > 0 && discountPercent <= 100) {
            finalPrice = finalPrice * (1 - discountPercent / 100);
        }

        const finalMainPrice = Math.floor(finalPrice);
        const finalFractionalPrice = Math.round((finalPrice - finalMainPrice) * 100);
        const formattedFractional = finalFractionalPrice < 10 ? '0' + finalFractionalPrice : finalFractionalPrice;

        // Рядок формули
        formulaText.innerHTML = `${lang === 'uk' ? 'За' : 'For'} <b>${tMain} ${unit.main} ${tFractional} ${unit.fractional}</b> <br><span style="font-size:12px; color:#7f8c8d;">(${lang === 'uk' ? 'при ціні' : 'at price'} ${pMain} ${currMain} ${pFractional} ${currFractional} ${t.formula_part} ${bMain} ${unit.main} ${bFractional} ${unit.fractional})</span>`;

        // Виведення результату
        resultValue.textContent = `${finalMainPrice} ${currMain} ${formattedFractional} ${currFractional}`;
    }

    // Логіка збереження товарів до списку порівняння
    function saveCurrentItem() {
        const lang = langSelect.value;
        const currType = currencySelect.value;
        const unitType = unitTypeSelect.value;
        const currMain = currencies[currType].main;
        const currFractional = currencies[currType].fractional;
        const unit = translations[lang].units[unitType];

        const { totalPrice, totalBaseMeasure, totalTargetMeasure, discountPercent } = getValues();

        if (totalBaseMeasure <= 0) return;

        if (savedItems.length >= 3) {
            savedItems.shift(); // Видаляємо найстаріший товар, якщо вже є 3
        }

        const pricePerUnit = totalPrice / totalBaseMeasure;
        let finalPrice = pricePerUnit * totalTargetMeasure;
        if (discountPercent > 0 && discountPercent <= 100) {
            finalPrice = finalPrice * (1 - discountPercent / 100);
        }

        const finalMainPrice = Math.floor(finalPrice);
        const finalFractionalPrice = Math.round((finalPrice - finalMainPrice) * 100);
        const formattedFractional = finalFractionalPrice < 10 ? '0' + finalFractionalPrice : finalFractionalPrice;

        // Розраховуємо чисту вартість за 1 повну базову одиницю (1 кг / 1 л / 1 м) із врахуванням знижки для об'єктивності порівняння
        let unitCostWithDiscount = pricePerUnit;
        if (discountPercent > 0 && discountPercent <= 100) {
            unitCostWithDiscount = pricePerUnit * (1 - discountPercent / 100);
        }

        savedItems.push({
            unitCost: unitCostWithDiscount,
            display: `${finalMainPrice} ${currMain} ${formattedFractional} ${currFractional} (${totalTargetMeasure.toFixed(3)} ${unit.main})`
        });

        renderHistory();
    }

    // Візуалізація списку та підсвічування зеленим плашки "ВИГІДНО!"
    function renderHistory() {
        const lang = langSelect.value;
        const t = translations[lang];
        historyList.innerHTML = '';

        if (savedItems.length === 0) return;

        // Пошук індексу найдешевшого товару на основі математики
        let minCost = Infinity;
        let bestIndex = -1;
        savedItems.forEach((item, index) => {
            if (item.unitCost < minCost) {
                minCost = item.unitCost;
                bestIndex = index;
            }
        });

        savedItems.forEach((item, index) => {
            const itemRow = document.createElement('div');
            itemRow.className = 'history-item';
            
            if (index === bestIndex && savedItems.length > 1) {
                itemRow.className += ' item-best-style';
                itemRow.innerHTML = `<span>${t.item_text} №${index + 1}: <b>${item.display}</b></span> <span class=\"badge-best\">${t.badge_best}</span>`;
            } else {
                itemRow.innerHTML = `<span>${t.item_text} №${index + 1}: <b>${item.display}</b></span>`;
            }
            historyList.appendChild(itemRow);
        });
    }

    // Повний сброс калькулятора та історії порівняння товарів
    function resetCalculator() {
        priceMainInput.value = "0";
        priceFractionalInput.value = "0";
        baseMainInput.value = "0";
        baseFractionalInput.value = "0";
        targetMainInput.value = "0";
        targetFractionalInput.value = "0";
        finalDiscountInput.value = "0";
        savedItems = [];
        calculate();
        renderHistory();
    }

    // Слухачі подій для відкриття та закриття модального вікна довідки
    btnHelp.addEventListener('click', () => {
        helpModal.style.display = 'flex';
    });

    closeModal.addEventListener('click', () => {
        helpModal.style.display = 'none';
    });

    window.addEventListener('click', (event) => {
        if (event.target === helpModal) {
            helpModal.style.display = 'none';
        }
    });

    // Слухачі змін значень полів введення
    [priceMainInput, priceFractionalInput, baseMainInput, baseFractionalInput, targetMainInput, targetFractionalInput, finalDiscountInput].forEach(element => {
        element.addEventListener('input', calculate);
    });
    
    langSelect.addEventListener('change', updateLanguageAndLabels);
    currencySelect.addEventListener('change', updateLanguageAndLabels);
    unitTypeSelect.addEventListener('change', updateLanguageAndLabels);
    btnReset.addEventListener('click', resetCalculator);
    btnSave.addEventListener('click', saveCurrentItem);

    // Стартова ініціалізація додатка
    updateLanguageAndLabels();
</script>

</body>
</html>
