<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Універсальний калькулятор "помічник покупця"</title>
    <style>
        :root {
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-blue: #3498db;
            --accent-result: #27ae60;
            --formula-bg: #eaeded;
            --border-color: #dcdde1;
            --btn-reset-bg: #e74c3c;
            --btn-reset-hover: #c0392b;
            --btn-save-bg: #2ecc71;
            --btn-save-hover: #27ae60;
            --btn-help-bg: #f39c12;
            --btn-help-hover: #d35400;
            --discount-bg: #fff8e1;
            --discount-border: #ffb300;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .calculator-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.4rem;
            color: var(--text-main);
        }

        .settings-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .settings-item {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .settings-item label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-main);
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--accent-blue);
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin: 15px 0 8px 0;
            color: var(--text-main);
            border-left: 3px solid var(--accent-blue);
            padding-left: 8px;
        }

        .input-group-composite {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #fcfcfd;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 12px;
        }

        .input-subfield {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-subfield label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .input-subfield input {
            text-align: center;
            padding: 8px;
        }

        .separator {
            font-weight: bold;
            color: var(--text-muted);
            margin-top: 15px;
        }

        .discount-container {
            background-color: var(--discount-bg);
            border: 1px solid var(--discount-border);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .discount-container label {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .discount-container input {
            width: 80px;
            text-align: center;
            border-color: var(--discount-border);
        }

        .result-box {
            background-color: #e8f8f5;
            border: 2px solid var(--accent-result);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-result);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .btn-reset {
            background-color: var(--btn-reset-bg);
        }

        .btn-reset:hover {
            background-color: var(--btn-reset-hover);
        }

        .btn-save {
            background-color: var(--btn-save-bg);
        }

        .btn-save:hover {
            background-color: var(--btn-save-hover);
        }

        .btn-help {
            background-color: var(--btn-help-bg);
        }

        .btn-help:hover {
            background-color: var(--btn-help-hover);
        }

        .history-box {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }

        .history-title {
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background-color: #f8f9fa;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-best-style {
            background-color: #e8f8f5;
            border-color: #2ecc71;
        }

        .badge-best {
            background-color: var(--accent-result);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Стилі для модального вікна (Довідка) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
